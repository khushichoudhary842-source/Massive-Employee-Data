version: '3.8'

services:
  employee-dashboard:
    build: .
    container_name: employee-analytics-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./cleaned_employee_dataset_for_dashboard.csv:/app/cleaned_employee_dataset_for_dashboard.csv:ro
      - ./app.py:/app/app.py:ro
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_CLIENT_SHOWMENUCONFIG=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add a reverse proxy (Nginx) for production
  # nginx:
  #   image: nginx:alpine
  #   container_name: dashboard-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - employee-dashboard
  #   restart: unless-stopped

# Usage:
# docker-compose up              - Start the dashboard
# docker-compose down            - Stop the dashboard
# docker-compose logs -f         - View logs in real-time
# docker-compose ps              - Show running containers
